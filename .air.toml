root = "."
tmp_dir = ".tmp/air"

[build]
cmd = "go build -o ./.tmp/bin/backend-dev ."
bin = ".tmp/bin/backend-dev"
include_dir = ["app", "cmd", "common", "config", "static"]
include_file = ["main.go", "go.mod", "go.sum"]
exclude_dir = [".git", ".github", ".tmp", "dist", "frontend", "node_modules", "temp", "test", "upstream"]
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = true
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = 500
log = "build-errors.log"

[build.windows]
cmd = "go build -o ./.tmp/bin/backend-dev.exe ."
bin = ".tmp\\bin\\backend-dev.exe"

[log]
time = true

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true
